name: Validate

# Runs on every push and PR to catch malformed manifests. Typically these
# come from goreleaser bugs or hand-edits (don't hand-edit). The checks
# are fast: JSON syntax + Scoop manifest schema.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-manifests:
    name: JSON syntax + Scoop schema
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Validate JSON syntax
        run: |
          set -euo pipefail
          shopt -s nullglob
          fail=0
          for f in *.json; do
            if ! jq empty "$f"; then
              echo "::error file=$f::invalid JSON"
              fail=1
            fi
          done
          exit $fail

      - name: Validate against Scoop manifest schema
        run: |
          set -euo pipefail
          shopt -s nullglob
          # Pin the schema to an immutable Scoop release commit (v0.5.3) rather
          # than the moving `master` ref so validation behavior can't change
          # silently under us. Bump deliberately when intentionally updating.
          curl -fsSL -o /tmp/scoop-schema.json \
            'https://raw.githubusercontent.com/ScoopInstaller/Scoop/b588a06e41d920d2123ec70aee682bae14935939/schema.json'
          # Pin ajv-cli (and its resolved tree) to an exact version. --no-save
          # keeps package.json/package-lock.json out of the repo root so they
          # don't get picked up by the `*.json` manifest loops below.
          npm install --silent --no-save --save-exact ajv-cli@5.0.0
          fail=0
          for f in *.json; do
            if ! npx ajv validate -s /tmp/scoop-schema.json -d "$f" --strict=false; then
              echo "::error file=$f::manifest fails Scoop schema"
              fail=1
            fi
          done
          exit $fail
